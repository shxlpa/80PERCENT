<style>
.block-design {
  --design-cream: #EDDDC5;
  --design-gold: #C8B067;
  --design-red: #db281f;
  padding: 0;
  color: var(--design-cream);
}
.design-page {
  padding: clamp(1rem, 2vw, 2rem);
}
.design-hero {
  position: relative;
  display: grid;
  grid-template-columns: minmax(10rem, 22rem) minmax(0, 1fr);
  gap: clamp(1rem, 2vw, 2rem);
  align-items: start;
  min-height: min(78vh, 46rem);
  margin-bottom: clamp(2.5rem, 7vw, 5.5rem);
  padding-top: clamp(5rem, 12vh, 7rem);
}
.design-process {
  width: 100%;
}
.design-process img,
.design-piece img {
  display: block;
  width: 100%;
  height: auto;
  object-fit: contain;
}
.design-process img {
  max-height: 72vh;
}
.design-title {
  position: relative;
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 900;
  font-size: clamp(6rem, 13vw, 15rem);
  line-height: 0.86;
  letter-spacing: 0;
  color: var(--design-cream);
  text-align: right;
  z-index: 2;
  width: 100%;
  max-width: 100%;
  white-space: nowrap;
  overflow: visible;
  text-shadow: 0.018em 0 0 var(--design-cream);
}
.design-section {
  margin-top: clamp(3rem, 8vw, 6rem);
}
.design-section:first-of-type {
  margin-top: 0;
}
.design-section-title {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(2.5rem, 5vw, 4.5rem);
  line-height: 0.92;
  letter-spacing: 0;
  color: var(--design-gold);
  margin-bottom: clamp(0.9rem, 2vw, 1.5rem);
}
.design-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: clamp(0.9rem, 1.7vw, 1.35rem);
  width: 100%;
  align-items: start;
}
.design-grid--cutting {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}
.design-grid--driftwood {
  grid-template-columns: repeat(2, minmax(0, 1fr));
  max-width: min(100%, 72rem);
}
.design-grid--large {
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: clamp(0.9rem, 1.7vw, 1.35rem);
}
.design-piece {
  display: block;
  width: 100%;
  min-width: 0;
}
.design-process img,
.design-piece img {
  border: 3px solid var(--black);
  box-shadow: 0 0 0 2px var(--design-red);
  background: rgba(237, 221, 197, 0.04);
}
@media (max-width: 1180px) {
  .design-grid,
  .design-grid--cutting,
  .design-grid--large {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
@media (max-width: 820px) {
  .design-page {
    padding: 0.9rem 0.45rem 1.4rem;
  }
  .design-hero {
    grid-template-columns: 1fr;
    min-height: 0;
    padding-top: 0;
    margin-bottom: 3rem;
  }
  .design-title {
    order: -1;
    margin-bottom: 1rem;
    font-size: clamp(4.5rem, 25vw, 8rem);
    white-space: normal;
  }
  .design-process {
    width: 100%;
  }
  .design-process img {
    max-height: none;
  }
  .design-grid {
    grid-template-columns: 1fr;
  }
}

<script>
(function() {
  var title = document.querySelector('[data-fit-title]');
  if (!title) return;

  function fitTitle() {
    var hero = title.closest('.design-hero');
    if (!hero) return;

    var isMobile = window.matchMedia('(max-width: 820px)').matches;
    var bounds = title.getBoundingClientRect();
    var maxWidth = bounds.width;
    var maxHeight = isMobile ? window.innerHeight * 0.26 : hero.getBoundingClientRect().height * 0.6;

    title.style.fontSize = '16px';
    if (!maxWidth) return;

    var low = 16;
    var high = isMobile ? 190 : 520;

    for (var i = 0; i < 18; i += 1) {
      var mid = (low + high) / 2;
      title.style.fontSize = mid + 'px';

      var fitsWidth = title.scrollWidth <= maxWidth + 1;
      var fitsHeight = title.getBoundingClientRect().height <= maxHeight + 1;

      if (fitsWidth && fitsHeight) {
        low = mid;
      } else {
        high = mid;
      }
    }

    title.style.fontSize = Math.floor(low) + 'px';
  }

  function queueFit() {
    window.requestAnimationFrame(fitTitle);
  }

  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(queueFit);
  }
  window.addEventListener('load', queueFit);
  window.addEventListener('resize', queueFit);
  queueFit();
})();
</script>
