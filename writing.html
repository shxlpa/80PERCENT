<section class="content-section bg-off-white">
  <div style="max-width: 1100px; margin: 0 auto;">

      Subscribe on Substack →

<script>
const STATIC_POSTS = [
  {
    title: "Making Friends with Foreigners",
    date: "November 29, 2025",
    url: "https://shxlpa.substack.com/",
    snippet: "I am an electrical engineer, multimedia artist, and musician. I recently took a gap year from engineering to develop myself as a traveler, artist, and human."
  },
];

const container = document.getElementById('posts-container');

function renderPosts(posts) {
  let html = '<div class="writing-list">';
  posts.forEach((post, i) => {
    const delay = i < 3 ? ' reveal reveal-delay-' + i : ' reveal';
    html += '<a href="' + post.url + '" target="_blank" rel="noopener" class="writing-entry' + delay + '">';
    html += '<div class="date">' + post.date + '</div>';
    html += '<h3>' + post.title + '</h3>';
    if (post.snippet) html += '<p>' + post.snippet + '</p>';
    html += '</a>';
  });
  html += '</div>';
  container.innerHTML = html;

  const obs = new IntersectionObserver(e => e.forEach(n => {
    if (n.isIntersecting) n.target.classList.add('visible');
  }), { threshold: 0.1 });
  container.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

renderPosts(STATIC_POSTS);

(async function fetchLive() {
  const PROXIES = ['https://corsproxy.io/?','https://api.allorigins.win/raw?url='];
  const FEED = 'https://shxlpa.substack.com/feed';
  for (const proxy of PROXIES) {
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 4000);
      const res = await fetch(proxy + encodeURIComponent(FEED), { signal: controller.signal });
      clearTimeout(timer);
      if (!res.ok) continue;
      const text = await res.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      const items = xml.querySelectorAll('item');
      if (items.length === 0) return;
      const livePosts = [];
      items.forEach(item => {
        const title = item.querySelector('title')?.textContent || 'Untitled';
        const link = item.querySelector('link')?.textContent || '#';
        const pubDate = item.querySelector('pubDate')?.textContent;
        const desc = item.querySelector('description')?.textContent || '';
        let date = '';
        if (pubDate) date = new Date(pubDate).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        const tmp = document.createElement('div');
        tmp.innerHTML = desc;
        let snippet = tmp.textContent || '';
        if (snippet.length > 200) snippet = snippet.substring(0, 200).trim() + '…';
        livePosts.push({ title, date, url: link, snippet });
      });
      renderPosts(livePosts);
      return;
    } catch (e) { continue; }
  }
})();

addEventListener('scroll', () => document.querySelector('nav').classList.toggle('scrolled', scrollY > 60));
</script>
